services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fuelops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fuelops_dev}
      POSTGRES_DB: ${POSTGRES_DB:-fuelops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fuelops}:${POSTGRES_PASSWORD:-fuelops_dev}@db:5432/${POSTGRES_DB:-fuelops}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
