services:
  db:
    container_name: fuelops_db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fuelops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fuelops_dev}
      POSTGRES_DB: ${POSTGRES_DB:-fuelops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB && PGPASSWORD=$$POSTGRES_PASSWORD psql -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'select 1' -q -t -A >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - lyntrix_network

  api:
    container_name: fuelops_api
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fuelops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fuelops_dev}
      # Hostname único: en lyntrix_network otro stack puede tener servicio "db" y romper auth.
      POSTGRES_HOST: fuelops_db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-fuelops}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lyntrix_network

  frontend:
    container_name: fuelops_web
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api-tickets.irrigacionmalargue.net}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - lyntrix_network

volumes:
  postgres_data:
  uploads_data:

networks:
  lyntrix_network:
    external: true
